name: termux-release-promote

on:
  push:
    branches:
      - "release/**"

permissions:
  actions: read
  attestations: read
  checks: read
  contents: read
  deployments: read
  issues: read
  discussions: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read

concurrency:
  group: termux-release-promote-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-24.04
    if: ${{ !contains(github.event.head_commit.message, 'Seed Termux release automation') }}
    permissions:
      actions: read
      contents: write
      pull-requests: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🧰 Actions Toolbox
        # This is required for the GitHub CLI
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        uses: wallentx/gh-actions/composite/actions-toolbox@main

      - name: Read release metadata
        id: metadata
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          metadata=".github/termux-release.json"
          if [[ ! -f "${metadata}" ]]; then
            echo "No ${metadata}; this push is not a Termux release promotion."
            echo "promote=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          upstream_tag="$(jq -r '.upstream_tag // empty' "${metadata}")"
          termux_tag="$(jq -r '.termux_tag // empty' "${metadata}")"
          upstream_prerelease="$(jq -r '.upstream_prerelease // true' "${metadata}")"
          upstream_html_url="$(jq -r '.upstream_html_url // ""' "${metadata}")"
          release_train="$(jq -r '.release_train // ""' "${metadata}")"
          if [[ -z "${upstream_tag}" || -z "${termux_tag}" ]]; then
            echo "Missing upstream_tag or termux_tag in ${metadata}" >&2
            exit 1
          fi

          if gh release view "${termux_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "${termux_tag} already exists; skipping promotion."
            echo "promote=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "promote=true"
            echo "upstream_tag=${upstream_tag}"
            echo "termux_tag=${termux_tag}"
            echo "upstream_prerelease=${upstream_prerelease}"
            echo "upstream_html_url=${upstream_html_url}"
            echo "release_train=${release_train}"
          } >> "$GITHUB_OUTPUT"

      - name: Locate merged pull request
        if: steps.metadata.outputs.promote == 'true'
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          prs="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls"
          )"
          pr_json="$(
            jq -c --arg base "${GITHUB_REF_NAME}" '
              [.[] | select(.merged_at != null and .base.ref == $base)]
              | sort_by(.number)
              | reverse
              | .[0] // empty
            ' <<< "${prs}"
          )"
          if [[ -z "${pr_json}" ]]; then
            pr_json="$(
              gh pr list \
                --repo "${GITHUB_REPOSITORY}" \
                --base "${GITHUB_REF_NAME}" \
                --state merged \
                --json number,headRefOid,headRefName,mergeCommit \
                --jq "[.[] | select(.mergeCommit.oid == \"${GITHUB_SHA}\")] | sort_by(.number) | reverse | .[0] // empty"
            )"
          fi
          if [[ -z "${pr_json}" ]]; then
            echo "Unable to find merged PR for ${GITHUB_SHA} into ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          pr_number="$(jq -r '.number' <<< "${pr_json}")"
          head_sha="$(jq -r '.headRefOid // .head.sha' <<< "${pr_json}")"
          head_ref="$(jq -r '.headRefName // .head.ref' <<< "${pr_json}")"
          artifact_name="termux-android-pr-${pr_number}-${head_sha}"
          {
            echo "number=${pr_number}"
            echo "head_sha=${head_sha}"
            echo "head_ref=${head_ref}"
            echo "artifact_name=${artifact_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Download promoted PR artifact
        if: steps.metadata.outputs.promote == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_ARTIFACT_NAME: ${{ steps.pr.outputs.artifact_name }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          find_run_id() {
            local event="$1"
            gh api \
              --method GET \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/rust-release.yml/runs" \
              -f event="${event}" \
              -f status=success \
              -f head_sha="${HEAD_SHA}" \
              --jq '.workflow_runs | sort_by(.created_at) | reverse | .[0].id // empty'
          }

          find_artifact_id() {
            local run_id="$1"
            local artifact_name="$2"
            gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" \
              --jq ".artifacts[] | select(.name == \"${artifact_name}\") | .id" \
              | head -n 1
          }

          artifact_name="${PR_ARTIFACT_NAME}"
          run_id="$(find_run_id pull_request)"
          artifact_id=""
          if [[ -n "${run_id}" ]]; then
            artifact_id="$(find_artifact_id "${run_id}" "${artifact_name}")"
          fi

          if [[ -z "${artifact_id}" ]]; then
            artifact_name="aarch64-linux-android"
            run_id="$(find_run_id workflow_dispatch)"
            if [[ -n "${run_id}" ]]; then
              artifact_id="$(find_artifact_id "${run_id}" "${artifact_name}")"
            fi
          fi

          if [[ -z "${run_id}" || -z "${artifact_id}" ]]; then
            echo "No successful rust-release artifact found for ${HEAD_SHA}" >&2
            echo "Expected either pull_request artifact ${PR_ARTIFACT_NAME} or workflow_dispatch artifact aarch64-linux-android." >&2
            exit 1
          fi

          mkdir -p promoted
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
            --output "${RUNNER_TEMP}/artifact.zip"
          unzip -q "${RUNNER_TEMP}/artifact.zip" -d promoted
          ls -la promoted
          if [[ -f promoted/SHA256SUMS ]]; then
            (cd promoted && sha256sum -c SHA256SUMS)
          fi

      - name: Create mirrored Termux release
        if: steps.metadata.outputs.promote == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          UPSTREAM_TAG: ${{ steps.metadata.outputs.upstream_tag }}
          TERMUX_TAG: ${{ steps.metadata.outputs.termux_tag }}
          UPSTREAM_PRERELEASE: ${{ steps.metadata.outputs.upstream_prerelease }}
          UPSTREAM_HTML_URL: ${{ steps.metadata.outputs.upstream_html_url }}
          RELEASE_TRAIN: ${{ steps.metadata.outputs.release_train }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          body_path="${RUNNER_TEMP}/release-body.md"
          {
            echo "Termux Android build for ${UPSTREAM_TAG}."
            echo
            echo "- Upstream release: ${UPSTREAM_HTML_URL}"
            echo "- Release train: \`${RELEASE_TRAIN}\`"
            echo "- Promoted PR: #${PR_NUMBER}"
            echo "- Promoted PR head SHA: \`${HEAD_SHA}\`"
            echo
            echo "This release promotes the exact Android artifact built by the PR check."
          } > "${body_path}"

          git tag "${TERMUX_TAG}" "${GITHUB_SHA}"
          git push origin "${TERMUX_TAG}"

          release_args=(
            gh release create "${TERMUX_TAG}"
            --repo "${GITHUB_REPOSITORY}"
            --target "${GITHUB_SHA}"
            --title "${TERMUX_TAG}"
            --notes-file "${body_path}"
          )
          if [[ "${UPSTREAM_PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi
          release_args+=(promoted/*)
          "${release_args[@]}"
