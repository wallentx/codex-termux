name: termux-release-deploy

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Release branch to deploy, for example release/0.124.0"
        required: true
        type: string
      release_sha:
        description: "Release branch commit SHA to deploy. Defaults to the branch head."
        required: false
        default: ""
        type: string
      pr_number:
        description: "Merged release PR number to promote. Optional; normally discovered automatically."
        required: false
        default: ""
        type: string
      pr_head_sha:
        description: "Merged release PR head SHA. Required only when pr_number is set."
        required: false
        default: ""
        type: string
      destination_branch:
        description: "Destination patch branch to receive the checkpoint PR"
        required: false
        default: "wallentx/termux-target"
        type: string
      reviewer:
        description: "GitHub username to request as reviewer on the checkpoint PR"
        required: false
        default: "wallentx"
        type: string

permissions:
  actions: read
  attestations: read
  checks: read
  contents: read
  deployments: read
  issues: read
  discussions: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read

concurrency:
  group: termux-release-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.release_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'Seed Termux release automation') }}
    permissions:
      actions: read
      contents: write
      deployments: write
      issues: write
      pull-requests: write
    env:
      GH_REPO: ${{ github.repository }}
      REQUESTED_RELEASE_BRANCH: ${{ inputs.release_branch }}
      REQUESTED_RELEASE_SHA: ${{ inputs.release_sha }}
      INPUT_PR_NUMBER: ${{ inputs.pr_number }}
      INPUT_PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
      DESTINATION_BRANCH: ${{ inputs.destination_branch || 'wallentx/termux-target' }}
      REVIEWER: ${{ inputs.reviewer || 'wallentx' }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_branch || github.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: 🧰 Actions Toolbox
        # This is required for the GitHub CLI
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        uses: wallentx/gh-actions/composite/actions-toolbox@main

      - name: Configure git
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          release_branch="${REQUESTED_RELEASE_BRANCH:-${GITHUB_REF_NAME}}"
          git fetch --prune origin "${DESTINATION_BRANCH}" "${release_branch}"

      - name: Resolve release ref
        id: release-ref
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_branch="${REQUESTED_RELEASE_BRANCH}"
            if [[ -n "${REQUESTED_RELEASE_SHA}" ]]; then
              git checkout --detach "${REQUESTED_RELEASE_SHA}"
              release_sha="${REQUESTED_RELEASE_SHA}"
            else
              release_sha="$(git rev-parse HEAD)"
            fi
          else
            release_branch="${GITHUB_REF_NAME}"
            release_sha="${GITHUB_SHA}"
          fi

          {
            echo "branch=${release_branch}"
            echo "sha=${release_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Read release metadata
        id: metadata
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          metadata=".github/termux-release.json"
          if [[ ! -f "${metadata}" ]]; then
            echo "No ${metadata}; this push is not a Termux release deployment."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          upstream_tag="$(jq -r '.upstream_tag // empty' "${metadata}")"
          upstream_name="$(jq -r '.upstream_name // .upstream_tag // empty' "${metadata}")"
          termux_tag="$(jq -r '.termux_tag // empty' "${metadata}")"
          upstream_version="${upstream_tag#rust-v}"
          upstream_version="${upstream_version%-termux}"
          upstream_prerelease=false
          if [[ "${upstream_version}" == *-* ]]; then
            upstream_prerelease=true
          fi
          upstream_html_url="$(jq -r '.upstream_html_url // ""' "${metadata}")"
          upstream_repo="$(jq -r '.upstream_repo // "openai/codex"' "${metadata}")"
          release_train="$(jq -r '.release_train // ""' "${metadata}")"
          if [[ -z "${upstream_tag}" || -z "${termux_tag}" ]]; then
            echo "Missing upstream_tag or termux_tag in ${metadata}" >&2
            exit 1
          fi

          release_exists=false
          asset_exists=false
          if gh release view "${termux_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            release_exists=true
            release_asset_exists="$(
              gh release view "${termux_tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json assets \
                --jq '.assets | map(.name) | any(. == "codex-aarch64-linux-android.tar.gz")'
            )"
            if [[ "${release_asset_exists}" == "true" ]]; then
              asset_exists=true
            fi
          fi

          {
            echo "deploy=true"
            echo "upstream_tag=${upstream_tag}"
            echo "upstream_name=${upstream_name}"
            echo "termux_tag=${termux_tag}"
            echo "upstream_prerelease=${upstream_prerelease}"
            echo "upstream_html_url=${upstream_html_url}"
            echo "upstream_repo=${upstream_repo}"
            echo "release_train=${release_train}"
            echo "release_exists=${release_exists}"
            echo "asset_exists=${asset_exists}"
          } >> "$GITHUB_OUTPUT"

      - name: Create deployment
        if: steps.metadata.outputs.deploy == 'true'
        id: deployment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release-ref.outputs.sha }}
          TERMUX_TAG: ${{ steps.metadata.outputs.termux_tag }}
        run: |
          set -euo pipefail
          deployment_id="$(
            gh api \
              -X POST \
              "repos/${GITHUB_REPOSITORY}/deployments" \
              -f ref="${RELEASE_SHA}" \
              -f environment="termux-release" \
              -F auto_merge=false \
              -F required_contexts[] \
              -f description="Termux release deployment for ${TERMUX_TAG}" \
              --jq '.id'
          )"
          echo "id=${deployment_id}" >> "$GITHUB_OUTPUT"

      - name: Mark deployment in progress
        if: steps.metadata.outputs.deploy == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.id }}
        run: |
          set -euo pipefail
          log_url="${GH_WORKFLOW_URL:-${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"
          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state="in_progress" \
            -f environment="termux-release" \
            -f log_url="${log_url}" \
            -F auto_inactive=false \
            -f description="Promoting Termux release artifact and preparing checkpoint PR" \
            >/dev/null

      - name: Locate merged pull request
        if: steps.metadata.outputs.deploy == 'true' && steps.metadata.outputs.asset_exists != 'true'
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_BRANCH: ${{ steps.release-ref.outputs.branch }}
          RELEASE_SHA: ${{ steps.release-ref.outputs.sha }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_PR_NUMBER}" || -n "${INPUT_PR_HEAD_SHA}" ]]; then
            if [[ -z "${INPUT_PR_NUMBER}" || -z "${INPUT_PR_HEAD_SHA}" ]]; then
              echo "workflow_dispatch inputs pr_number and pr_head_sha must be provided together." >&2
              exit 1
            fi

            pr_number="${INPUT_PR_NUMBER}"
            head_sha="${INPUT_PR_HEAD_SHA}"
            head_ref=""
            artifact_name="termux-android-pr-${pr_number}-${head_sha}"
            {
              echo "number=${pr_number}"
              echo "head_sha=${head_sha}"
              echo "head_ref=${head_ref}"
              echo "artifact_name=${artifact_name}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_json="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --base "${RELEASE_BRANCH}" \
              --state merged \
              --limit 100 \
              --json number,headRefOid,headRefName,mergeCommit \
              --jq "[.[] | select(.mergeCommit.oid == \"${RELEASE_SHA}\")] | sort_by(.number) | reverse | .[0] // empty"
          )"
          if [[ -z "${pr_json}" ]]; then
            echo "Unable to find merged PR for ${RELEASE_SHA} into ${RELEASE_BRANCH}" >&2
            exit 1
          fi

          pr_number="$(jq -r '.number' <<< "${pr_json}")"
          head_sha="$(jq -r '.headRefOid // .head.sha' <<< "${pr_json}")"
          head_ref="$(jq -r '.headRefName // .head.ref' <<< "${pr_json}")"
          artifact_name="termux-android-pr-${pr_number}-${head_sha}"
          {
            echo "number=${pr_number}"
            echo "head_sha=${head_sha}"
            echo "head_ref=${head_ref}"
            echo "artifact_name=${artifact_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Download promoted PR artifact
        if: steps.metadata.outputs.deploy == 'true' && steps.metadata.outputs.asset_exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_ARTIFACT_NAME: ${{ steps.pr.outputs.artifact_name }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          find_run_id() {
            local event="$1"
            gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow rust-release.yml \
              --event "${event}" \
              --status success \
              --commit "${HEAD_SHA}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty'
          }

          artifact_name="${PR_ARTIFACT_NAME}"
          run_id="$(find_run_id pull_request)"
          mkdir -p promoted
          if [[ -n "${run_id}" ]] && gh run download "${run_id}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${artifact_name}" \
            --dir promoted; then
            :
          else
            artifact_name="aarch64-linux-android"
            run_id="$(find_run_id workflow_dispatch)"
            if [[ -z "${run_id}" ]]; then
              echo "No successful rust-release run found for ${HEAD_SHA}" >&2
              exit 1
            fi
            gh run download "${run_id}" \
              --repo "${GITHUB_REPOSITORY}" \
              --name "${artifact_name}" \
              --dir promoted
          fi

          ls -la promoted
          if [[ -f promoted/SHA256SUMS ]]; then
            (cd promoted && sha256sum -c SHA256SUMS)
          fi
          if [[ ! -f promoted/codex-aarch64-linux-android.tar.gz ]]; then
            echo "Expected promoted/codex-aarch64-linux-android.tar.gz in the downloaded artifact." >&2
            exit 1
          fi

      - name: Create or update mirrored Termux release
        if: steps.metadata.outputs.deploy == 'true' && steps.metadata.outputs.asset_exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          UPSTREAM_TAG: ${{ steps.metadata.outputs.upstream_tag }}
          UPSTREAM_REPO: ${{ steps.metadata.outputs.upstream_repo }}
          UPSTREAM_NAME: ${{ steps.metadata.outputs.upstream_name }}
          TERMUX_TAG: ${{ steps.metadata.outputs.termux_tag }}
          UPSTREAM_PRERELEASE: ${{ steps.metadata.outputs.upstream_prerelease }}
          UPSTREAM_HTML_URL: ${{ steps.metadata.outputs.upstream_html_url }}
          RELEASE_TRAIN: ${{ steps.metadata.outputs.release_train }}
          RELEASE_EXISTS: ${{ steps.metadata.outputs.release_exists }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          RELEASE_SHA: ${{ steps.release-ref.outputs.sha }}
        run: |
          set -euo pipefail
          body_path="${RUNNER_TEMP}/release-body.md"
          upstream_body_path="${RUNNER_TEMP}/upstream-release-body.md"
          upstream_body_without_changelog_path="${RUNNER_TEMP}/upstream-release-body-without-changelog.md"
          if gh release view "${UPSTREAM_TAG}" \
            --repo "${UPSTREAM_REPO}" \
            --json body \
            --jq '.body // ""' > "${upstream_body_path}"; then
            awk '
              function heading_level(line, text) {
                if (match(line, /^(#{1,6})[[:space:]]+(.+)$/, parts)) {
                  text = tolower(parts[2])
                  sub(/[[:space:]]+#+[[:space:]]*$/, "", text)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", text)
                  if (text == "changelog" || text == "change log") {
                    return length(parts[1])
                  }
                }
                return 0
              }

              {
                if (!skip) {
                  level = heading_level($0)
                  if (level > 0) {
                    skip = 1
                    skip_level = level
                    next
                  }
                  print
                  next
                }

                if (match($0, /^(#{1,6})[[:space:]]+/, parts) && length(parts[1]) <= skip_level) {
                  skip = 0
                  print
                }
              }
            ' "${upstream_body_path}" > "${upstream_body_without_changelog_path}"
          else
            echo "::warning title=Upstream release notes unavailable::Could not read ${UPSTREAM_REPO} release ${UPSTREAM_TAG}."
            : > "${upstream_body_without_changelog_path}"
          fi

          {
            echo "Termux Android build for ${UPSTREAM_TAG}."
            echo
            echo "- Upstream release: ${UPSTREAM_HTML_URL}"
            echo "- Release train: \`${RELEASE_TRAIN}\`"
            echo "- Promoted PR: #${PR_NUMBER}"
            echo "- Promoted PR head SHA: \`${HEAD_SHA}\`"
          } > "${body_path}"
          if [[ -s "${upstream_body_without_changelog_path}" ]]; then
            {
              echo
              echo "## Upstream release notes"
              echo
              cat "${upstream_body_without_changelog_path}"
            } >> "${body_path}"
          fi

          release_title="${UPSTREAM_NAME}"
          if [[ -z "${release_title}" || "${release_title}" == "null" ]]; then
            release_title="${TERMUX_TAG}"
          fi

          if [[ "${RELEASE_EXISTS}" == "true" ]]; then
            gh release upload \
              "${TERMUX_TAG}" \
              "promoted/codex-aarch64-linux-android.tar.gz#codex-termux" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            exit 0
          fi

          release_args=(
            gh release create "${TERMUX_TAG}"
            --repo "${GITHUB_REPOSITORY}"
            --target "${RELEASE_SHA}"
            --title "${release_title}"
            --notes-file "${body_path}"
          )
          if [[ "${UPSTREAM_PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi
          release_args+=("promoted/codex-aarch64-linux-android.tar.gz#codex-termux")
          "${release_args[@]}"

      - name: Ensure checkpoint PR
        if: steps.metadata.outputs.deploy == 'true'
        id: checkpoint
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_BRANCH: ${{ steps.release-ref.outputs.branch }}
          SOURCE_SHA: ${{ steps.release-ref.outputs.sha }}
        run: |
          set -euo pipefail

          short_sha="${SOURCE_SHA:0:12}"
          source_slug="${SOURCE_BRANCH//\//_}"
          dest_slug="${DESTINATION_BRANCH//\//_}"
          checkpoint_branch="checkpoint/${dest_slug}_from_${source_slug}_${short_sha}"
          pr_title="checkpoint: into ${DESTINATION_BRANCH} from ${SOURCE_BRANCH} @ ${short_sha}"
          merge_conflicted=false
          conflict_summary=""

          existing_pr="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --head "${checkpoint_branch}" \
              --state all \
              --json number,state,mergedAt,url \
              --jq '[.[] | select(.state == "OPEN" or .mergedAt != null)] | .[0] // empty'
          )"
          if [[ -n "${existing_pr}" ]]; then
            existing_url="$(jq -r '.url' <<< "${existing_pr}")"
            existing_state="$(jq -r '.state' <<< "${existing_pr}")"
            echo "Checkpoint PR already exists for ${checkpoint_branch}: ${existing_url} (${existing_state})."
            echo "pr_url=${existing_url}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -B "${checkpoint_branch}" "origin/${DESTINATION_BRANCH}"

          if ! git merge --no-ff --no-edit "${SOURCE_SHA}"; then
            mapfile -t conflicted_paths < <(git diff --name-only --diff-filter=U)
            if [[ "${#conflicted_paths[@]}" -eq 1 && "${conflicted_paths[0]}" == "codex-rs/Cargo.toml" ]]; then
              echo "Auto-resolving recurring codex-rs/Cargo.toml checkpoint conflict by keeping ${SOURCE_BRANCH}."
              git checkout --theirs -- codex-rs/Cargo.toml
              git add codex-rs/Cargo.toml
              git commit --no-edit
            else
              merge_conflicted=true
              conflict_summary="$(
                printf '%s\n' "${conflicted_paths[@]}" | sed 's/^/- `&`/'
              )"
              echo "Automatic checkpoint merge failed; creating a manual-resolution PR instead." >&2
              if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
                git merge --abort
              fi
              git checkout -B "${checkpoint_branch}" "${SOURCE_SHA}"
            fi
          fi

          if git cat-file -e "origin/${DESTINATION_BRANCH}:.github" 2>/dev/null; then
            git restore --source="origin/${DESTINATION_BRANCH}" --staged --worktree -- .github
            mapfile -t added_github_paths < <(
              git diff --name-only --diff-filter=A "origin/${DESTINATION_BRANCH}" -- .github
            )
            if ((${#added_github_paths[@]})); then
              git rm -f -- "${added_github_paths[@]}"
            fi
          else
            git rm -r --ignore-unmatch .github
          fi

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A .github
            if [[ "${merge_conflicted}" == "true" ]]; then
              git commit -m "checkpoint: prepare ${SOURCE_BRANCH} for ${DESTINATION_BRANCH}"
            else
              git commit --amend --no-edit
            fi
          fi

          if git diff --quiet "origin/${DESTINATION_BRANCH}" HEAD; then
            echo "Checkpoint merge produced no destination changes after release-only files were restored."
            exit 0
          fi

          git push --force-with-lease origin "${checkpoint_branch}"

          remaining="$(
            git log --first-parent --pretty=format:%H "${SOURCE_SHA}..origin/${SOURCE_BRANCH}" | wc -w
          )"

          body_path="${RUNNER_TEMP}/termux-checkpoint-pr.md"
          {
            echo "## Termux release checkpoint"
            echo
            echo "- Source branch: \`${SOURCE_BRANCH}\`"
            echo "- Source hash: \`${SOURCE_SHA}\`"
            echo "- Destination branch: \`${DESTINATION_BRANCH}\`"
            echo "- Remaining first-parent commits on source: ${remaining}"
            echo
            echo "This PR carries release-train conflict fixes and follow-up changes back into the reusable Termux patch branch."
            if [[ "${merge_conflicted}" == "true" ]]; then
              echo
              echo "## Merge conflicts"
              echo
              echo "GitHub Actions could not create the checkpoint merge commit automatically, so this PR was created from the source branch state for manual conflict resolution."
              echo
              echo "Conflicted paths from the failed merge attempt:"
              if [[ -n "${conflict_summary}" ]]; then
                printf '%s\n' "${conflict_summary}"
              else
                echo "- Conflict details unavailable"
              fi
            fi
            echo
            echo "Release-only workflow files and metadata under \`.github\` were restored to the destination branch versions before opening this PR."
          } > "${body_path}"

          pr_url="$(
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base "${DESTINATION_BRANCH}" \
              --head "${checkpoint_branch}" \
              --title "${pr_title}" \
              --body-file "${body_path}"
          )"
          gh pr edit "${pr_url}" --repo "${GITHUB_REPOSITORY}" --add-reviewer "${REVIEWER}" || true
          gh label create checkpoint --repo "${GITHUB_REPOSITORY}" --color c5def5 --description "Checkpoint merge" --force
          gh label create termux-release --repo "${GITHUB_REPOSITORY}" --color 0e8a16 --description "Termux release automation" --force
          gh pr edit "${pr_url}" --repo "${GITHUB_REPOSITORY}" --add-label "checkpoint" --add-label "termux-release"
          echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        if: steps.metadata.outputs.deploy == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.id }}
          TERMUX_TAG: ${{ steps.metadata.outputs.termux_tag }}
        run: |
          set -euo pipefail
          log_url="${GH_WORKFLOW_URL:-${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"
          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state="success" \
            -f environment="termux-release" \
            -f log_url="${log_url}" \
            -F auto_inactive=false \
            -f description="Termux release deployment completed for ${TERMUX_TAG}" \
            >/dev/null

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.id }}
        run: |
          set -euo pipefail
          log_url="${GH_WORKFLOW_URL:-${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"
          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state="failure" \
            -f environment="termux-release" \
            -f log_url="${log_url}" \
            -F auto_inactive=false \
            -f description="Termux release deployment failed" \
            >/dev/null
